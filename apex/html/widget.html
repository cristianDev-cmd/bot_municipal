<!-- Estilos de seguridad preventivos en caso de fallo del CSS externo -->
<style>
    #chatLauncher {
        position: fixed !important;
        bottom: 30px !important;
        right: 30px !important;
        width: 70px !important;
        height: 70px !important;
        z-index: 99990 !important;
        border: none !important;
        background: none !important;
        padding: 0 !important;
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
        cursor: pointer !important;
    }

    #chatLauncher .image-container {
        width: 100% !important;
        height: 100% !important;
        border-radius: 50% !important;
        overflow: hidden !important;
        border: 3px solid #e94e20 !important;
        background: #fff !important;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3) !important;
    }

    #chatLauncher .bot_flotante {
        width: 100% !important;
        height: 100% !important;
        object-fit: cover !important;
        display: block !important;
    }

    /* TOOLTIP DE GREGORIO (Fuerza visualización contra caché) */
    .gregorio-tooltip-box {
        position: fixed !important;
        right: 115px !important; /* 30px (botón right) + 70px (ancho botón) + 15px (margen) */
        bottom: 65px !important; /* Centro exacto del botón (30 + 35) */
        transform: translateY(50%) !important;
        background: #ffffff !important;
        color: #333333 !important;
        padding: 10px 16px !important;
        border-radius: 12px !important;
        font-size: 14px !important;
        font-weight: 500 !important;
        white-space: nowrap !important;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15) !important;
        border: 1px solid #e2e8f0 !important;
        pointer-events: none !important;
        opacity: 1 !important;
        transition: opacity 0.3s ease, transform 0.3s ease !important;
        animation: floatTooltip 3s ease-in-out infinite !important;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif !important;
        z-index: 2147483647 !important;
        display: block !important;
        visibility: visible !important;
        width: max-content !important;
    }

    .gregorio-tooltip-box::before {
        content: '' !important;
        position: absolute !important;
        right: -7px !important;
        top: 50% !important;
        transform: translateY(-50%) !important;
        border-width: 7px 0 7px 7px !important;
        border-style: solid !important;
        border-color: transparent transparent transparent #e2e8f0 !important;
    }

    .gregorio-tooltip-box::after {
        content: '' !important;
        position: absolute !important;
        right: -6px !important;
        top: 50% !important;
        transform: translateY(-50%) !important;
        border-width: 6px 0 6px 6px !important;
        border-style: solid !important;
        border-color: transparent transparent transparent #ffffff !important;
    }

    @keyframes floatTooltip {
        0%, 100% { transform: translateY(50%) translateX(0); }
        50% { transform: translateY(50%) translateX(-8px); }
    }

    .gregorio-tooltip-box.hidden {
        opacity: 0 !important;
        transform: translateY(50%) translateX(20px) !important;
        pointer-events: none !important;
        animation: none !important;
    }
    
    /* ESTILO PARA EL TÍTULO DE PRUEBA H1 */
    h1.titulo-prueba {
        color: #ffffff;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 2.2rem;
        font-weight: 800;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        text-shadow: 2px 4px 8px rgba(0, 0, 0, 0.6);
        margin: 50px auto;
        padding: 25px 40px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 16px;
        max-width: 900px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }
</style>

<h1 class="titulo-prueba">PRUEBA BOT DE LA MUNICIPALIDAD DE LAS HERAS</h1>

<audio id="soundSend" src="https://web6.lasheras.gob.ar/apex/gumuser/escudo/img/8" preload="auto"></audio>
<audio id="soundReceive" src="https://web6.lasheras.gob.ar/apex/gumuser/escudo/img/7" preload="auto"></audio>
<audio id="soundTyping" src="https://web6.lasheras.gob.ar/apex/gumuser/escudo/img/9" preload="auto" loop></audio>

<button id="chatLauncher" title="Abrir Asistente" type="button">
    <div class="pulse-ring"></div>
    <div class="image-container swing-animation">
        <img class="bot_flotante" src="https://lasheras.gob.ar/wp-content/uploads/2026/03/gregorio.jpeg" alt="Chat">
    </div>
    <div id="notificationBadge" class="notification-badge hidden">0</div>
</button>

<div id="chatWidget" class="chat-container hidden">
    <div class="chat-header">
        <div class="header-info">
            <img src="https://lasheras.gob.ar/wp-content/uploads/2026/03/gregorio.jpeg" class="header-avatar">
            <div class="header-text">
                <span class="bot-name">Asistente Virtual</span>
                <span class="muni-name">Muni. Las Heras</span>
            </div>
        </div>
        <div class="header-controls">
            <button id="btnHome" title="Menú Principal" class="header-btn" type="button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M9 14L4 9l5-5"></path>
                    <path d="M4 9h10c4 0 7 3 7 7v1"></path>
                </svg>
            </button>
            <button id="btnClear" title="Limpiar Chat" class="header-btn" type="button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
            </button>
            <button id="btnClose" title="Cerrar" class="header-btn" type="button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
    </div>

    <div id="chatMessages" class="chat-messages"></div>

    <div class="chat-input-area">
        <div id="textInputContainer" class="input-mode active">
            <input id="userInput" type="text" placeholder="Escribe un mensaje..." autocomplete="off" />
            <button id="btnSend" class="enviar-btn" type="button" title="Enviar">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
            <button id="btnMic" type="button" class="chat-mic-btn">🎤</button>
        </div>

        <div id="recordingContainer" class="input-mode recording-mode">
            <button id="btnRecDelete" type="button" class="rec-action-btn rec-delete-btn" title="Cancelar grabación">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="#ffffff">
                    <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" />
                </svg>
            </button>
            <div class="rec-info">
                <span id="recTimer" class="rec-timer">
                    <span class="rec-dot"></span>
                    <span id="recTimerText">0:00</span>
                </span>
                <div class="rec-waves">
                    <span class="rec-wave-bar"></span>
                    <span class="rec-wave-bar"></span>
                    <span class="rec-wave-bar"></span>
                    <span class="rec-wave-bar"></span>
                    <span class="rec-wave-bar"></span>
                    <span class="rec-wave-bar"></span>
                    <span class="rec-wave-bar"></span>
                    <span class="rec-wave-bar"></span>
                    <span class="rec-wave-bar"></span>
                    <span class="rec-wave-bar"></span>
                    <span class="rec-wave-bar"></span>
                    <span class="rec-wave-bar"></span>
                    <span class="rec-wave-bar"></span>
                    <span class="rec-wave-bar"></span>
                    <span class="rec-wave-bar"></span>
                    <span class="rec-wave-bar"></span>
                    <span class="rec-wave-bar"></span>
                    <span class="rec-wave-bar"></span>
                    <span class="rec-wave-bar"></span>
                    <span class="rec-wave-bar"></span>
                </div>
            </div>
            <button id="btnRecSend" type="button" class="rec-action-btn rec-send-btn" title="Enviar audio">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="#ffffff">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                </svg>
            </button>
        </div>

        <div id="ratingContainer" class="input-mode rating-mode">
            <span class="rating-text">¿Te fue útil la ayuda?</span>
            <div class="stars">
                <span class="star" data-value="1">★</span>
                <span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span>
                <span class="star" data-value="4">★</span>
                <span class="star" data-value="5">★</span>
            </div>
            <button id="closeRating" class="close-rating-btn" title="Omitir">✕</button>
        </div>
    </div>
</div>
